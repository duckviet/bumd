openapi: 3.1.0
info:
  title: Payments API
  version: 2026-06-04
servers:
  - url: https://api.example.test
paths:
  /payments:
    post:
      operationId: createPayment
      tags:
        - Payments
      summary: Create a payment
      parameters:
        - name: customerId
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - currency
              properties:
                amount:
                  type: integer
                currency:
                  type: string
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
  /refunds:
    post:
      operationId: createRefund
      tags:
        - Refunds
      summary: Create a refund
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - paymentId
              properties:
                paymentId:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Refund"
components:
  schemas:
    Payment:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
        status:
          type: string
        receiptUrl:
          type: string
          format: uri
    Refund:
      type: object
      required:
        - id
        - paymentId
      properties:
        id:
          type: string
        paymentId:
          type: string
