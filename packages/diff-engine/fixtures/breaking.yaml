openapi: 3.1.0
info:
  title: Payments
  version: 2.0.0
paths:
  /charges:
    get:
      parameters:
        - name: currency
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  amount:
                    type: string
